name: "rotbench"
description: "Run the RotBench memory-integrity gate with hsm verify."

inputs:
  vault:
    description: "Path to the markdown memory vault."
    required: false
    default: "."
  deep:
    description: "Run hsm verify --deep."
    required: false
    default: "false"
  min-score:
    description: "Optional minimum RotBench score. Empty means gate on hsm exit code only."
    required: false
    default: ""

runs:
  using: "composite"
  steps:
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.x"

    - name: Install homestead-memory
      shell: bash
      run: python -m pip install homestead-memory

    - name: Run RotBench
      shell: bash
      env:
        INPUT_VAULT: ${{ inputs.vault }}
        INPUT_DEEP: ${{ inputs.deep }}
        INPUT_MIN_SCORE: ${{ inputs.min-score }}
      run: |
        set +e
        args=("verify" "$INPUT_VAULT" "--json")
        if [ "${INPUT_DEEP,,}" = "true" ]; then
          args+=("--deep")
        fi
        json="$(hsm "${args[@]}")"
        rc=$?
        set -e

        printf '%s\n' "$json" > "$RUNNER_TEMP/rotbench.json"

        python - "$RUNNER_TEMP/rotbench.json" "$rc" "$INPUT_MIN_SCORE" "$GITHUB_STEP_SUMMARY" <<'PY'
        import json
        import sys
        from pathlib import Path

        report_path = Path(sys.argv[1])
        exit_code = int(sys.argv[2])
        min_score_raw = sys.argv[3].strip()
        summary_path = Path(sys.argv[4])

        try:
            rep = json.loads(report_path.read_text())
        except Exception as exc:
            print(f"RotBench did not emit valid JSON: {exc}", file=sys.stderr)
            sys.exit(exit_code or 1)

        score = int(rep.get("score", 0))
        stamp = str(rep.get("stamp", "ROT DETECTED"))
        ok = bool(rep.get("ok", False))

        with summary_path.open("a", encoding="utf-8") as fh:
            fh.write(f"RotBench: {score}/100 — {stamp}\n")

        if min_score_raw:
            try:
                min_score = int(min_score_raw)
            except ValueError:
                print("min-score must be an integer when set", file=sys.stderr)
                sys.exit(1)
            if score < min_score:
                print(f"RotBench score {score} is below min-score {min_score}", file=sys.stderr)
                sys.exit(1)

        if exit_code != 0 or not ok:
            print(f"RotBench failed: {score}/100 — {stamp}", file=sys.stderr)
            sys.exit(exit_code or 1)

        sys.exit(0)
        PY
