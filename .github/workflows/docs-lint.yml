name: docs-lint

on:
  pull_request:
    paths:
      - "docs/**"
      - "benchmarks/README.md"
      - "benchmarks/ROTBENCH.md"
      - "deploy/**/README.md"
      - "examples/**/README.md"
      - "SECURITY_RELEASE.md"
      - ".vale.ini"
      - "styles/**"
      - "DOCS_STYLE.md"
      - ".github/workflows/docs-lint.yml"
  workflow_dispatch:

permissions:
  contents: read

env:
  VALE_VERSION: "3.15.1"

jobs:
  vale:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Vale
        run: |
          mkdir -p "$HOME/.local/bin"
          curl -sL "https://github.com/errata-ai/vale/releases/download/v${VALE_VERSION}/vale_${VALE_VERSION}_Linux_64-bit.tar.gz" \
            | tar -xz -C "$HOME/.local/bin" vale
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
      - name: Sync styles
        run: vale sync
      - name: Lint reference docs (fail on errors only; warnings are advisory)
        run: |
          vale --minAlertLevel=error \
            docs benchmarks/README.md benchmarks/ROTBENCH.md deploy examples SECURITY_RELEASE.md
