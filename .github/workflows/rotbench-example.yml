# Local deterministic verification. No unpublished third-party action or vault
# contents are uploaded to a hosted action.
name: RotBench

on:
  pull_request:
  push:
    branches: [main]

jobs:
  verify-memory:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: install
        run: python -m pip install -e ".[sign]" pytest
      - name: verify local repository memory
        run: |
          hsm init ./ci-vault
          hsm verify ./ci-vault --quiet
          hsm verify --demo >/dev/null 2>&1 && exit 1 || true
          pytest tests/ -q
