name: release

on:
  push:
    tags: ["v*.*.*"]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify:
    permissions:
      contents: read
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: install test tooling
        run: |
          python -m pip install --upgrade pip build twine pytest pytest-timeout
          pip install -e ".[sign]"
      - name: test
        run: pytest tests/ -q --timeout=120 --timeout-method=thread
      - name: build immutable artifact
        run: python -m build --wheel --outdir dist
      - name: inspect artifact
        run: |
          python -m twine check dist/*
          python scripts/verify_artifact.py
      - uses: actions/upload-artifact@v4
        with:
          name: homestead-release-${{ github.ref_name }}
          path: |
            dist/*
  publish:
    needs: verify
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    environment: release
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: homestead-release-${{ github.ref_name }}
          path: dist
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist
          skip-existing: true
      - uses: softprops/action-gh-release@v2
        with:
          files: dist/homestead_memory-*.whl
          generate_release_notes: true
  canary:
    needs: publish
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: read
    environment: vps-canary
    steps:
      - name: Canary deploy to an isolated VPS (optional; skips cleanly when unconfigured)
        env:
          DEPLOY_HOST: ${{ secrets.HOMESTEAD_DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.HOMESTEAD_DEPLOY_USER }}
          DEPLOY_KEY: ${{ secrets.HOMESTEAD_DEPLOY_SSH_KEY }}
          DEPLOY_KNOWN_HOSTS: ${{ secrets.HOMESTEAD_DEPLOY_KNOWN_HOSTS }}
        run: |
          if [ -z "$DEPLOY_HOST" ] || [ -z "$DEPLOY_USER" ] || [ -z "$DEPLOY_KEY" ] || [ -z "$DEPLOY_KNOWN_HOSTS" ]; then
            echo "::notice title=Canary skipped::No VPS deploy secrets configured; this optional post-publish smoke deploy is disabled."
            echo "This workflow is a template. It never contains server details — it only reads private repository secrets at run time."
            echo "To enable the canary, add these repository secrets (Settings > Secrets and variables > Actions):"
            echo "  - HOMESTEAD_DEPLOY_HOST"
            echo "  - HOMESTEAD_DEPLOY_USER"
            echo "  - HOMESTEAD_DEPLOY_SSH_KEY"
            echo "  - HOMESTEAD_DEPLOY_KNOWN_HOSTS"
            echo "Then provide the adapter described in deploy/canary/README.md."
            exit 0
          fi
          echo "VPS deploy secrets present. The configured adapter runs deploy/canary/deploy.sh, health_gate.sh, and keeps rollback evidence."
