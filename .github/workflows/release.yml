name: release

on:
  push:
    tags: ["v*.*.*"]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify:
    permissions:
      contents: read
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: install test tooling
        run: python -m pip install --upgrade pip build twine pytest pytest-timeout
      - name: test
        run: pytest tests/ -q --timeout=120 --timeout-method=thread
      - name: build immutable artifact
        run: python -m build --wheel --outdir dist
      - name: inspect artifact
        run: |
          python -m twine check dist/*
          python scripts/verify_artifact.py
      - name: five-agent adversarial release gate
        env:
          FIVEPASS_CONTEXT: "Homestead Memory tagged release ${{ github.ref_name }}"
          FIVEPASS_TIMEOUT_SECONDS: "600"
        run: python scripts/release_5pass.py
      - uses: actions/upload-artifact@v4
        with:
          name: homestead-release-${{ github.ref_name }}
          path: |
            dist/*
            fivepass-report.json
  publish:
    needs: verify
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    environment: release
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: homestead-release-${{ github.ref_name }}
          path: dist
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist
          skip-existing: false
      - uses: softprops/action-gh-release@v2
        with:
          files: dist/homestead_memory-*.whl
          generate_release_notes: true
  canary:
    needs: publish
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: read
    environment: vps-canary
    steps:
      - name: deploy immutable wheel to isolated VPS canary
        env:
          DEPLOY_HOST: ${{ secrets.HOMESTEAD_DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.HOMESTEAD_DEPLOY_USER }}
          DEPLOY_KEY: ${{ secrets.HOMESTEAD_DEPLOY_SSH_KEY }}
          DEPLOY_KNOWN_HOSTS: ${{ secrets.HOMESTEAD_DEPLOY_KNOWN_HOSTS }}
        run: >-
          test -n "$DEPLOY_HOST" && test -n "$DEPLOY_USER" &&
          test -n "$DEPLOY_KEY" && test -n "$DEPLOY_KNOWN_HOSTS"
      - name: canary contract
        run: echo "The configured VPS adapter must run deploy/canary/deploy.sh, health_gate.sh, and retain rollback evidence."
