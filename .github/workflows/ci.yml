name: ci

on:
  push:
    branches: [master, main]
  pull_request:

# least privilege: CI only reads the repo; no event-payload text is ever
# interpolated into run: commands (workflow-injection guidance honored)
permissions:
  contents: read

jobs:
  test:
    name: py${{ matrix.python }} · ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        # the cross-platform claim is a CI matrix, not a slogan
        os: [ubuntu-latest, macos-latest, windows-latest]
        python: ["3.10", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
      - name: install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[sign]" pytest
      - name: unit + protocol tests
        run: pytest tests/ -q
      - name: cli smoke (init → verify → demo catches rot)
        shell: bash
        run: |
          hsm --version
          hsm init ./ci-vault
          hsm verify ./ci-vault --quiet
          # the demo plants rot and must exit nonzero — the product's core promise
          if hsm verify --demo > /dev/null 2>&1; then
            echo "demo failed to catch planted rot" && exit 1
          else
            echo "demo caught the rot (nonzero exit) ✓"
          fi
