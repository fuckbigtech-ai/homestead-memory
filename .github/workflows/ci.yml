name: ci

on:
  push:
    branches: [master, main]
  pull_request:

# least privilege: CI only reads the repo; no event-payload text is ever
# interpolated into run: commands (workflow-injection guidance honored)
permissions:
  contents: read

jobs:
  test:
    name: py${{ matrix.python }} · ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        # the cross-platform claim is a CI matrix, not a slogan
        os: [ubuntu-latest, macos-latest, windows-latest]
        python: ["3.10", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
      - name: install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[sign]" pytest pytest-timeout
      - name: unit + protocol tests
        # thread method works on Windows (signal-based timeouts do not); a hanging
        # test fails named instead of silently killing the whole job.
        run: pytest tests/ -q --timeout=120 --timeout-method=thread
      - name: cli smoke (init → verify → demo catches rot)
        shell: bash
        run: |
          hsm --version
          hsm init ./ci-vault
          hsm verify ./ci-vault --quiet
          # the demo plants rot and must exit nonzero — the product's core promise
          if hsm verify --demo > /dev/null 2>&1; then
            echo "demo failed to catch planted rot" && exit 1
          else
            echo "demo caught the rot (nonzero exit) ✓"
          fi
      - name: reproducible wheel build
        run: |
          python -c "import shutil; shutil.rmtree('dist', ignore_errors=True)"
          python -m pip wheel . --no-deps --wheel-dir dist
          python scripts/wheel_smoke.py

  qmd-runtime:
    name: qmd 2.1 runtime · ubuntu
    runs-on: ubuntu-latest
    env:
      HSM_QMD_CACHE_DIR: /tmp/homestead-qmd-${{ github.run_id }}/cache
      HSM_QMD_CONFIG_DIR: /tmp/homestead-qmd-${{ github.run_id }}/config
      HSM_QMD_STATE_DIR: /tmp/homestead-qmd-${{ github.run_id }}/state
      HSM_QMD_INDEX_PATH: /tmp/homestead-qmd-${{ github.run_id }}/cache/index.sqlite
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: install package and pinned qmd
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          npm install --global @tobilu/qmd@2.1.0
          qmd --version
      - name: exercise real MCP lifecycle
        shell: bash
        run: |
          set -euo pipefail
          start="$(hsm qmd start --json)"
          printf '%s\n' "$start"
          python -c 'import json,sys; d=json.load(sys.stdin); assert d["ok"] and d["pid_owned"] and d["endpoint_healthy"]' <<<"$start"
          test "$(python -c 'import json,sys; print(json.load(sys.stdin)["index"])' <<<"$start")" = "$HSM_QMD_INDEX_PATH"
          status="$(hsm qmd status --json)"
          printf '%s\n' "$status"
          python -c 'import json,sys; d=json.load(sys.stdin); assert d["ok"] and d["pid_alive"] and d["pid_owned"]' <<<"$status"
          stop="$(hsm qmd stop --json)"
          printf '%s\n' "$stop"
          python -c 'import json,sys; d=json.load(sys.stdin); assert d["stopped"] and not d["pid_alive"] and not d["endpoint_healthy"]' <<<"$stop"
      - name: cleanup
        if: always()
        shell: bash
        run: hsm qmd stop --json || true
